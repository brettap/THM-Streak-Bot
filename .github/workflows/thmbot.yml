name: TryHackMe Streak Bot

on:
  schedule:
    # Runs at 16:00, 17:00, 18:00 UTC daily (3 attempts/day for reliability)
    - cron: "0 16,17,18 * * *"
  workflow_dispatch:

jobs:
  maintain-streak:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # Use Firefox ESR (more stable on GitHub runners) and ensure xvfb is available
      - name: Install Firefox ESR + Xvfb + deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y firefox-esr xvfb wget tar

      - name: Install Geckodriver
        run: |
          set -e
          GECKO_VER="0.33.0"
          wget -q "https://github.com/mozilla/geckodriver/releases/download/v${GECKO_VER}/geckodriver-v${GECKO_VER}-linux64.tar.gz"
          tar -xzf "geckodriver-v${GECKO_VER}-linux64.tar.gz"
          chmod +x geckodriver
          sudo mv geckodriver /usr/local/bin/geckodriver
          geckodriver --version

      - name: Install FFmpeg
        run: |
          set -e
          sudo apt-get install -y ffmpeg

      - name: Verify dependency versions
        run: |
          firefox --version || true
          firefox-esr --version || true
          geckodriver --version
          python --version
          pip --version

      - name: Install Python dependencies
        run: |
          set -e
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          # Optional: show key packages if present (won't fail if not installed)
          pip show selenium pydub SpeechRecognition || true

      - name: Create account configuration
        run: |
          set -e
          cat > account.conf <<'EOF'
          [account]
          mail = __THM_EMAIL__
          pass = __THM_PASSWORD__
          EOF
          sed -i "s/__THM_EMAIL__/${{ secrets.THM_EMAIL }}/" account.conf
          sed -i "s/__THM_PASSWORD__/${{ secrets.THM_PASSWORD }}/" account.conf

      # Start Xvfb and keep DISPLAY available for subsequent steps
      - name: Start virtual display
        run: |
          set -e
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension RANDR &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 2

      # The previous 5m timeout killed the bot (exit code 124) before it finished.
      # This makes it run long enough and FAILS the workflow if it times out.
      - name: Run THM Bot (with timeout)
        run: |
          set -e
          export TERM=xterm
          timeout 20m python -u main.py || (echo "THM bot timed out or failed" && exit 1)

      - name: Upload logs and screenshots as artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thm-bot-logs
          path: |
            tryhackmebot.log
            geckodriver.log
            *.png
          retention-days: 7
